# Role registry metadata for the role-based review engine (#ai-review-engine).
#
# This holds each role's metadata; a role's OWNED-TAG set is derived from ownership.yaml,
# never listed here (so a tag can be claimed in exactly one place). Composition -- the tags
# a reviewer READS -- lives in the reviewer persona under tools/claude/agents/review-<id>.md.
#
# Per-field meaning:
#   always              the role runs on every code-review round regardless of gating
#   base_lens           the always-on cross-cutting lens that owns the cross-cutting tags
#   instruction_review  the role participates in the instruction-review application (Phase 3)
#   spec_review         the role participates in the spec-review application (engine app #3,
#                       #ai-spec-review). Curated and INDEPENDENT of instruction_review: a role
#                       may join one, both, or neither. The spec-review generalist subsumes the
#                       swe + correctness lenses (so both are false here); the meta lenses ai/git
#                       review process/VCS rules, not a feature spec, so they are false too. The
#                       generalist's consultable menu is exactly this column filtered to true.
#
# correctness owns no tag by design (its subject is the diff's behavior, not a rule), so the
# coverage lint exempts it from the "every role owns >=1 tag" warning.
#
# `ai` and `git` are META LENSES: they own the process rules (agent behavior, VCS workflow)
# and run in instruction-review ONLY (always:false keeps them out of every code-review round,
# where those rules never produce a code finding). They replace the old `process` non-review
# marker -- every rule now has a reviewing lens, so there is no un-reviewed bucket.
#
# Repo config, like manifest.json. NEVER exported to AGENTS.md or the plugin.

roles:
  correctness: { always: true,  base_lens: false, instruction_review: false, spec_review: false }
  swe:         { always: true,  base_lens: true,  instruction_review: true,  spec_review: false }
  security:    { always: false, base_lens: false, instruction_review: true,  spec_review: true }
  db:          { always: false, base_lens: false, instruction_review: true,  spec_review: true }
  qa:          { always: false, base_lens: false, instruction_review: true,  spec_review: true }
  docs:        { always: false, base_lens: false, instruction_review: true,  spec_review: true }
  frontend:    { always: false, base_lens: false, instruction_review: true,  spec_review: true }
  ux:          { always: false, base_lens: false, instruction_review: true,  spec_review: true }
  ai:          { always: false, base_lens: false, instruction_review: true,  spec_review: false }
  git:         { always: false, base_lens: false, instruction_review: true,  spec_review: false }

# No non-review markers: every #tag resolves to a reviewing lens above.
markers: []
