# Role registry metadata for the role-based review engine (#ai-review-engine).
#
# This holds each role's metadata; a role's OWNED-TAG set is derived from ownership.yaml,
# never listed here (so a tag can be claimed in exactly one place). Composition -- the tags
# a reviewer READS -- lives in the reviewer persona under tools/claude/agents/review-<id>.md.
#
# Per-field meaning:
#   always              the role runs on every code-review round regardless of gating
#   base_lens           the always-on cross-cutting lens that owns the cross-cutting tags
#   instruction_review  the role participates in the instruction-review application (Phase 3)
#
# correctness owns no tag by design (its subject is the diff's behavior, not a rule), so the
# coverage lint exempts it from the "every role owns >=1 tag" warning.
#
# Repo config, like manifest.json. NEVER exported to AGENTS.md or the plugin.

roles:
  correctness: { always: true,  base_lens: false, instruction_review: false }
  swe:         { always: true,  base_lens: true,  instruction_review: true }
  security:    { always: false, base_lens: false, instruction_review: true }
  db:          { always: false, base_lens: false, instruction_review: true }
  qa:          { always: false, base_lens: false, instruction_review: true }
  docs:        { always: false, base_lens: false, instruction_review: true }
  frontend:    { always: false, base_lens: false, instruction_review: true }
  ux:          { always: false, base_lens: false, instruction_review: true }

# Owners outside the review taxonomy (rules nothing reviews).
markers:
  - process
